# bugwood_pathome.yaml
# ====================
# Knobs for the (Phase 0 canonical KB) + (Phase 0R regional deltas) pipeline.

data:
  csv_path: "BugWood_Diseases_usable.csv"   # filtered via scripts/filter_bugwood_csv.py
  image_cache_dir: ".bugwood_cache"
  min_per_class: 10                          # threshold for the filtered CSV

  download:
    enabled: true
    timeout: 20
    retries: 2

  quality_filters:
    min_side: 256
    require_state: true
    require_disease_label: true

# ------------------------------------------------------------------
# Phase 0R — Qwen swarm
# ------------------------------------------------------------------
# The vLLM client picks up these defaults; they are overridable via the
# VLLM_BASE_URL / VLLM_MODEL / VLLM_TIMEOUT / VLLM_TEMPERATURE env vars
# (see plantswarm.delta_pipeline.build_client_from_env).
model:
  backbone: "Qwen/Qwen2.5-VL-7B-Instruct"
  temperature: 0.2                           # JSON-faithful, low variance
  max_new_tokens: 512
  vllm_base_url: "http://localhost:8000/v1"
  vllm_timeout: 180                          # seconds per HTTP call

swarm:
  max_parallel: 4                            # outer parallelism: (crop,disease,state) tuples
  parallel_specialists: true                 # inner: 4 specialists per tuple in parallel
