# plantvillage_smoke_eval.yaml
# =============================
# Held-out PlantVillage eval, smoke-sized. Pulls a small random subset
# of TFDS PlantVillage instead of the full 54,306 images so Phase 5
# finishes in ~5-10 min on a single A100.

data:
  tfds_name: "plant_village"
  tfds_split: "train"
  tfds_max_examples: 200             # was 54,306
  tfds_seed: 42
  image_col: "image_bytes"
  id_col: "id"
  label_cols:
    T1: "symptom_type"
    T2: "pathogen_class"
    T3: "disease_name"
    T4: "severity_class"
    T5: "crop_species"
  benchmark_col: "benchmark"
  calibration_split_size: 50
  exclude_bugwood_image_ids: true

labels:
  T1:
    - "Lesion"
    - "Blight"
    - "Mosaic"
    - "Wilt"
    - "Rot"
    - "Canker"
    - "Rust"
    - "Powdery mildew"
  T2:
    - "Fungal"
    - "Bacterial"
    - "Viral"
    - "Nutrient deficiency"
    - "Pest damage"
  T3: null
  T4:
    - "Healthy"
    - "Early"
    - "Moderate"
    - "Severe"
  T5:
    - "Tomato"
    - "Soybean"

model:
  backbone: "Qwen/Qwen2.5-VL-7B-Instruct"
  temperature: 0.0
  seed: 42
  max_new_tokens: 256
  image_size: 448
  vllm_base_url: "http://localhost:8000/v1"

routing:
  orchestrator: "autogen_swarm"
  Tmax: 8
  confidence_weights: { high: 3, medium: 2, low: 1 }
  allow_backtrack: true
  max_backtracks: 1

pathome:
  load_dir: "smoke/artifacts/pathome_v1_seed/"

calibration:
  ece_bins: 10
  conformal_alpha: 0.1
  temperature_scaling: true

eval:
  bootstrap_n: 100
  mcnemar_alpha: 0.05
  bonferroni_correct: true

output:
  results_dir: "smoke/results/eval_pv/"
  traces_dir: "smoke/results/eval_pv/traces/"
  save_traces: true
  save_probs: true
