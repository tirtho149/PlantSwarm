# bugwood_pathome_smoke.yaml
# ===========================
# Two-crop smoke config (Soybean + Tomato).

data:
  csv_path: "smoke/BugWood_Diseases_smoke_usable.csv"
  image_cache_dir: "smoke/.bugwood_cache"
  min_per_class: 3

  download:
    enabled: true
    timeout: 20
    retries: 2

  quality_filters:
    min_side: 256
    require_state: true
    require_disease_label: true

# Phase 0R — Qwen swarm (same defaults as production; overridable via env vars).
model:
  backbone: "Qwen/Qwen2.5-VL-7B-Instruct"
  temperature: 0.2
  max_new_tokens: 256                        # halved from production
  vllm_base_url: "http://localhost:8000/v1"
  vllm_timeout: 180

swarm:
  max_parallel: 2                            # smaller than production (~50 tuples total)
  parallel_specialists: true
